---
layout: default
---

<a class="page-title" href="#">Blog</a>

<!-- Loops over all the posts in _posts -->
<ul id="post-list">
    {% for blog_post in site.posts %}
    <li class="post">
        <a href="" class="post-title">{{blog_post.title}}</a> <!-- Title of the post -->
        <p class="post-date">{{blog_post.date}}</p> <!-- Date of the post -->
        <p class="post-paragraphs">{{blog_post.meta}}</p> <!-- Contents of the post -->
    </li>
    {% endfor %}
</ul>
